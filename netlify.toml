[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Firebase *client* config values are meant to be public (they identify the
  # Firebase project to the browser SDK, same as any web app's Firebase setup).
  # Vite inlines these VITE_FIREBASE_* variables into the built JS bundle at
  # `npm run build` time, which Netlify's secrets scanner otherwise flags as a
  # leaked secret. Omitting just these keys keeps scanning enabled for every
  # other variable (GEMINI_API_KEY, FIREBASE_SERVICE_ACCOUNT_JSON, etc.).
  SECRETS_SCAN_OMIT_KEYS = "VITE_FIREBASE_API_KEY,VITE_FIREBASE_AUTH_DOMAIN,VITE_FIREBASE_PROJECT_ID,VITE_FIREBASE_STORAGE_BUCKET,VITE_FIREBASE_MESSAGING_SENDER_ID,VITE_FIREBASE_APP_ID"
